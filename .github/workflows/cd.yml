name: C# CD

on:
  workflow_run:
    workflows: ["C# CI"]
    types:
      - completed

jobs:

  deploy:

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: self-hosted

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Publish Application
        run: dotnet publish -c Release -o publish

      - name: Deploy to Folder
        run: |
          Remove-Item C:\deploy\* -Recurse -Force
          Copy-Item .\publish\* C:\deploy -Recurse

      - name: Run Application
        run: |
          cd C:\deploy
          dotnet csharp-cicd-demo.dll